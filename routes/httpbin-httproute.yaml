apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: httpbin
  namespace: default
spec:
  parentRefs:
    - name: gw
      namespace: ingress-gw
  hostnames:
    - "api.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        # Global (cross-cluster) mesh service. Resolved by the ServiceEntry/Hostname plugin,
        # which requires KGW_ENABLE_ISTIO_INTEGRATION=true. No namespace field -> no ReferenceGrant.
        - name: httpbin.httpbin.mesh.internal
          kind: Hostname
          group: networking.istio.io
          port: 8000
